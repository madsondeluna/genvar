version: '3.8'

services:
  backend:
    build: ./backend
    container_name: genvar-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - genvar-network

  frontend:
    build: ./frontend
    container_name: genvar-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - genvar-network

  redis:
    image: redis:7-alpine
    container_name: genvar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - genvar-network

networks:
  genvar-network:
    driver: bridge
